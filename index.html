<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K'uhul Ajaw — Lord of the Jungle Cities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0b0b0c;overflow:hidden;
    font-family:'Cinzel',serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  canvas#bg{position:fixed;inset:0;z-index:0}

  #card{
    position:relative;z-index:2;
    background:#f5f0e1;border:3px solid #ca8a04;border-radius:6px;
    padding:32px 36px 28px;max-width:500px;width:92%;
    box-shadow:0 0 0 6px rgba(0,0,0,.55),0 12px 60px rgba(0,0,0,.9);
    opacity:0;transform:translateY(18px);
    transition:opacity .55s ease, transform .55s ease;
    max-height:92vh;overflow-y:auto;
  }
  #card.visible{opacity:1;transform:translateY(0)}

  .eyebrow{
    font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;
    color:#0f766e;text-align:center;margin-bottom:6px;
  }
  h1{
    font-size:1.55rem;color:#1c1208;text-align:center;letter-spacing:.06em;
    text-transform:uppercase;line-height:1.2;margin-bottom:4px;
  }
  .subtitle{
    font-size:.72rem;color:#6b7c2a;text-align:center;letter-spacing:.14em;
    text-transform:uppercase;margin-bottom:18px;
  }
  .divider{
    height:1px;background:linear-gradient(to right,transparent,#ca8a04,transparent);
    margin:0 0 18px;
  }
  .story{
    font-size:.82rem;color:#2a1e0e;line-height:1.75;margin-bottom:18px;
  }
  .story em{color:#0f766e;font-style:normal;font-weight:600}
  .how-to{
    background:rgba(0,0,0,.04);border-left:3px solid #ca8a04;
    padding:12px 14px;border-radius:2px;margin-bottom:20px;
  }
  .how-to h3{
    font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
    color:#ca8a04;margin-bottom:10px;
  }
  .how-to ol{
    padding-left:0;list-style:none;
    display:flex;flex-direction:column;gap:7px;
  }
  .how-to li{
    font-size:.75rem;color:#1c1208;line-height:1.5;
    display:grid;grid-template-columns:1.4rem 1fr;gap:2px;
  }
  .how-to li .num{color:#ca8a04;font-weight:700}
  .how-to li .desc em{color:#0f766e;font-style:normal}
  .btn-begin{
    display:block;width:100%;padding:14px;
    background:#ca8a04;border:2px solid #a16207;border-radius:4px;
    font-family:'Cinzel',serif;font-size:.92rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;color:#1c1208;
    cursor:pointer;text-align:center;
    transition:background .15s,transform .1s;
  }
  .btn-begin:hover{background:#b07a03}
  .btn-begin:active{transform:scale(.98)}
  .footer-note{
    text-align:center;font-size:.62rem;color:#a89060;
    margin-top:12px;letter-spacing:.08em;
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- Language picker — shown first -->
<div id="lang-pick" style="
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  opacity:0;transform:translateY(12px);
  transition:opacity .55s ease, transform .55s ease;
">
  <div style="color:#ca8a04;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;margin-bottom:4px">K'uhul Ajaw</div>
  <div style="display:flex;gap:16px;">
    <button onclick="pickLang('en')" style="
      padding:16px 36px;background:#ca8a04;border:2px solid #a16207;border-radius:4px;
      font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;color:#1c1208;cursor:pointer;transition:background .15s;
    " onmouseover="this.style.background='#b07a03'" onmouseout="this.style.background='#ca8a04'">English</button>
    <button onclick="pickLang('es')" style="
      padding:16px 36px;background:#0f766e;border:2px solid #0d6460;border-radius:4px;
      font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;color:#e7e0d2;cursor:pointer;transition:background .15s;
    " onmouseover="this.style.background='#0d6460'" onmouseout="this.style.background='#0f766e'">Español</button>
  </div>
</div>

<!-- Parchment card — filled dynamically after language is chosen -->
<div id="card" style="display:none"></div>

<script>
// Clear any stale game state so each playthrough starts fresh (keep lang setting)
try { localStorage.removeItem('mayaThreeGameState'); } catch(e) {}

const CONTENT = {
  en: {
    eyebrow: "A Dynasty Begins",
    subtitle: "Lord of the Jungle Cities",
    story: `You rule a small Maya city-state deep in the lowland jungle.
      Your fields are narrow, your warriors few, and your name unknown
      beyond the nearest river bend.<br><br>
      To the east, the city of <em>Ox Witz</em> has grown fat on trade and
      slave labour. Their walls climb above the canopy. They have never
      paid tribute to anyone.<br><br>
      You will change that — if your farmers can feed your army,
      and your army can survive the march.`,
    howTitle: "How to Play",
    steps: [
      ["Farm.", "Walk the fields, talk to your farmers. Assign them as warriors or porters at the temple. Crops grow through the dry season — more farmers, more food."],
      ["Plan the march.", "The temple shows how far it is, how much food you'll need, and whether your porters can carry enough. Don't march short."],
      ["March.", "Events on the road drain food and morale. Every choice matters — especially when a porter deserts."],
      ["Fight.", "Your surviving warriors storm Ox Witz. Win and tribute carts will roll home. Lose and you walk back empty."],
      ["Watch the tribute.", "It won't last long. When the insult comes, you decide whether to march again — into doubled walls."],
    ],
    begin: "Begin Your Reign",
    footer: "Arrow keys or WASD to move &nbsp;·&nbsp; Tap or [E] to speak",
  },
  es: {
    eyebrow: "Comienza una Dinastía",
    subtitle: "Señor de las Ciudades de la Selva",
    story: `Gobiernas una pequeña ciudad-estado maya en lo profundo de la selva.
      Tus campos son estrechos, tus guerreros pocos, y tu nombre desconocido
      más allá del recodo del río más cercano.<br><br>
      Al este, la ciudad de <em>Ox Witz</em> se ha engordado con el comercio y
      el trabajo esclavo. Sus murallas se elevan sobre el dosel. Nunca han
      pagado tributo a nadie.<br><br>
      Tú cambiarás eso — si tus campesinos pueden alimentar a tu ejército,
      y tu ejército puede sobrevivir la marcha.`,
    howTitle: "Cómo Jugar",
    steps: [
      ["Cultiva.", "Camina por los campos, habla con tus campesinos. Asígnalos como guerreros o cargadores en el templo. Los cultivos crecen en la temporada seca — más campesinos, más comida."],
      ["Planea la marcha.", "El templo muestra qué tan lejos está, cuánta comida necesitarás y si tus cargadores pueden llevar suficiente. No marches con poco."],
      ["Marcha.", "Los eventos en el camino drenan comida y moral. Cada decisión importa — especialmente cuando un cargador deserta."],
      ["Pelea.", "Tus guerreros supervivientes asaltan Ox Witz. Gana y los carros de tributo rodarán hacia casa. Pierde y regresarás con las manos vacías."],
      ["Observa el tributo.", "No durará mucho. Cuando llegue el insulto, decides si marchas de nuevo — hacia murallas reforzadas."],
    ],
    begin: "Comienza tu Reinado",
    footer: "Flechas / WASD para moverse &nbsp;·&nbsp; Toca o [E] para hablar",
  },
};

function pickLang(lang) {
  localStorage.setItem('mayaLang', lang);
  const picker = document.getElementById('lang-pick');
  picker.style.opacity = '0';
  picker.style.transform = 'translateY(-10px)';
  setTimeout(() => {
    picker.style.display = 'none';
    buildCard(lang);
  }, 350);
}

function buildCard(lang) {
  const C = CONTENT[lang];
  const stepsHtml = C.steps.map((s, i) => `
    <li><span class="num">${i+1}</span><span class="desc">
      <em>${s[0]}</em> ${s[1]}
    </span></li>`).join('');
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="eyebrow">${C.eyebrow}</div>
    <h1>K'uhul Ajaw</h1>
    <div class="subtitle">${C.subtitle}</div>
    <div class="divider"></div>
    <p class="story">${C.story}</p>
    <div class="how-to">
      <h3>${C.howTitle}</h3>
      <ol>${stepsHtml}</ol>
    </div>
    <button class="btn-begin" onclick="begin()">${C.begin}</button>
    <p class="footer-note">${C.footer}</p>
  `;
  card.style.display = '';
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
}

// ── BACKGROUND CANVAS — starfield + jungle silhouette ─────────────────────────
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Seeded pseudo-random
function sr(n){ return Math.abs(Math.sin(n*9301+49297)*23423.4)%1; }

// Stars
const STARS = Array.from({length:160}, (_,i) => ({
  x: sr(i*3)   * 3000,
  y: sr(i*7)   * 400,
  r: 0.5 + sr(i*11) * 1.4,
  twinkle: sr(i*17) * Math.PI * 2,
}));

// Tree silhouette (far, mid)
function drawSilhouette(layer, yBase, sc, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = layer === 'far' ? '#060e06' : '#030a03';
  for (let i = 0; i < 28; i++) {
    const seed = i * 47 + layer.length;
    const x    = sr(seed)   * canvas.width;
    const h    = (18 + sr(seed+1) * 22) * sc;
    const w    = (8  + sr(seed+2) * 10) * sc;
    // trunk
    ctx.fillRect(x - w*.15, yBase - h, w*.3, h);
    // canopy layers
    [[0,h,w,w*.55],[0,h*.7,w*.8,w*.45],[0,h*.45,w*.62,w*.35]].forEach(([ox,oy,cw,ch]) => {
      ctx.beginPath();
      ctx.ellipse(x+ox*sc, yBase-oy, cw*.5, ch*.5, 0, 0, Math.PI*2);
      ctx.fill();
    });
  }
  ctx.restore();
}

let t = 0;
function draw(ts) {
  t = ts / 1000;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#04070f');
  sky.addColorStop(0.6, '#080e08');
  sky.addColorStop(1,   '#0c1a0c');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Stars
  const starW = W / canvas.width * W;
  ctx.save();
  STARS.forEach(s => {
    const sx = (s.x / 3000) * W;
    const sy = (s.y / 400)  * (H * 0.55);
    const tw = 0.7 + 0.3 * Math.sin(t * 1.1 + s.twinkle);
    ctx.globalAlpha = tw * 0.72;
    ctx.fillStyle = '#e7e0d2';
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();

  // Jungle silhouettes (two layers, slow parallax)
  const yH = H * 0.82;
  drawSilhouette('far', yH + Math.sin(t * 0.08) * 2,  H / 480 * 0.58, 0.55);
  drawSilhouette('mid', yH + 10 + Math.sin(t * 0.12) * 1.5, H / 480 * 0.82, 0.8);

  // Ground strip
  const grd = ctx.createLinearGradient(0, yH, 0, H);
  grd.addColorStop(0, '#0d1a0a');
  grd.addColorStop(1, '#060d05');
  ctx.fillStyle = grd;
  ctx.fillRect(0, yH, W, H - yH);

  // Fireflies
  for (let i = 0; i < 18; i++) {
    const fx = ((sr(i*3) * W + t * (12 + sr(i*7)*8)) % W);
    const fy = yH - 8 - sr(i*11) * 60 + Math.sin(t * (0.4 + sr(i*13)*0.6) + i) * 12;
    const pulse = 0.4 + 0.6 * Math.sin(t * (1.8 + sr(i*17)*1.2) + sr(i*19)*6);
    ctx.globalAlpha = pulse * 0.7;
    ctx.fillStyle = '#b8ff70';
    ctx.beginPath();
    ctx.arc(fx, fy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// Fade language picker in
setTimeout(() => {
  const p = document.getElementById('lang-pick');
  p.style.opacity = '1';
  p.style.transform = 'translateY(0)';
}, 120);

function begin() {
  const card = document.getElementById('card');
  card.style.transition = 'opacity .35s ease, transform .35s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(-12px)';
  setTimeout(() => { window.location.href = 'home-farmer.html'; }, 340);
}
</script>
</body>
</html>
